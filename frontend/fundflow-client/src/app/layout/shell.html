<div class="layout">
  <!-- Dimmed backdrop shown only while the drawer is open -->
  @if (sidebarOpen) {
    <div class="backdrop" (click)="closeSidebar()"></div>
  }

  <aside class="sidebar" [class.open]="sidebarOpen">
    <a routerLink="/app" class="brand" (click)="closeSidebar()">
      <div class="brand-mark">FF</div>
      <div class="brand-text">
        <span class="brand-name">FundFlow </span>
        <span class="brand-tag">Fund Accounting</span>
      </div>
    </a>

    <nav class="nav">
      @for (section of navSections; track section.title) {
        <span class="nav-section">{{ section.title }}</span>
        @for (item of section.items; track item.link) {
          <a [routerLink]="item.link"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: !!item.exact }"
             [class.nav-ai]="item.ai"
             (click)="closeSidebar()">
            <span class="nav-dot"></span> {{ item.label }}
          </a>
        }
      }
    </nav>

    <div class="sidebar-footer">
      <span>FinancialEdge NXT POC</span>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <div class="topbar-left">
        <button
          class="hamburger"
          [class.is-open]="sidebarOpen"
          (click)="toggleSidebar()"
          aria-label="Toggle navigation menu"
          [attr.aria-expanded]="sidebarOpen">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <a routerLink="/app" class="topbar-brand">
          <span class="topbar-brand-mark">FF</span>
          <span class="topbar-brand-name">FundFlow</span>
        </a>
      </div>
      <div class="topbar-right">
        <span class="env-pill">Development</span>
      </div>
    </header>
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
