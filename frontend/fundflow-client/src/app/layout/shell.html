<div class="layout">
  <aside class="sidebar">
    <a routerLink="/app" class="brand">
      <div class="brand-mark">FF</div>
      <div class="brand-text">
        <span class="brand-name">FundFlow </span>
        <span class="brand-tag">Fund Accounting</span>
      </div>
    </a>

    <nav class="nav">
      <span class="nav-section">Overview</span>
      <a routerLink="/app" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <span class="nav-dot"></span> Dashboard
      </a>

      <span class="nav-section">Modules</span>
      <a routerLink="/app/journal-entries" routerLinkActive="active"><span class="nav-dot"></span> General Ledger</a>
      <a routerLink="/app/treasury" routerLinkActive="active"><span class="nav-dot"></span> Treasury</a>
      <a routerLink="/app/accounts-payable" routerLinkActive="active"><span class="nav-dot"></span> Accounts Payable</a>
      <a routerLink="/app/grants" routerLinkActive="active"><span class="nav-dot"></span> Grants</a>
      <a routerLink="/app/budgeting" routerLinkActive="active"><span class="nav-dot"></span> Budgeting</a>

      <span class="nav-section">Intelligence</span>
      <a routerLink="/app/anomaly-detection" routerLinkActive="active" class="nav-ai"><span class="nav-dot"></span> Anomaly Detection</a>
    </nav>

    <div class="sidebar-footer">
      <span>FinancialEdge NXT POC</span>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <div class="topbar-title">Nonprofit Fund Accounting</div>
      <div class="topbar-right">
        <span class="env-pill">Development</span>
      </div>
    </header>
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
